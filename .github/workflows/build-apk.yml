name: Build NavRo APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject Android location + wake-lock permissions
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 - "$MANIFEST" <<'PY'
          import sys, re, pathlib
          path = pathlib.Path(sys.argv[1])
          text = path.read_text(encoding='utf-8')
          needed = [
              'android.permission.ACCESS_FINE_LOCATION',
              'android.permission.ACCESS_COARSE_LOCATION',
              'android.permission.WAKE_LOCK',
          ]
          add = []
          for p in needed:
              if p not in text:
                  add.append(f'    <uses-permission android:name="{p}" />')
          if add:
              block = '\n'.join(add) + '\n'
              # insert just before closing </manifest>
              text = re.sub(r'</manifest>\s*$', block + '</manifest>\n', text, count=1)
              path.write_text(text, encoding='utf-8')
              print('Injected permissions:', add)
          else:
              print('All permissions already present.')
          print('--- Final manifest ---')
          print(path.read_text(encoding='utf-8'))
          PY

      - name: Generate NavRo app icon
        run: |
          pip install Pillow numpy --quiet
          python3 resources/make_icon.py

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: navro-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
